<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global繁木力 · 来华留学</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', '微软雅黑', sans-serif;
        }
        body {
            background: #f0f7ff;
            padding: 30px 40px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 3.5rem;
            color: #1e3a5f;
            display: inline-block;
        }
        .family-tag {
            background: #ffd966;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.1rem;
            color: #1e3a5f;
            display: inline-block;
            margin-left: 15px;
        }
        .subtitle {
            color: #2c4c6e;
            font-size: 1.2rem;
            margin-top: 15px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #aac8e0;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .filter-bar {
            background: rgba(255,255,255,0.8);
            border-radius: 50px;
            padding: 15px 25px;
            margin: 30px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .filter-btn {
            background: white;
            border: 1px solid #b8d1e5;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.95rem;
            color: #1e3a5f;
            cursor: pointer;
        }
        .filter-btn.active {
            background: #1e3a5f;
            color: white;
            border-color: #1e3a5f;
        }
        .search-box {
            display: flex;
            background: white;
            border-radius: 40px;
            border: 1px solid #b8d1e5;
            overflow: hidden;
        }
        .search-box input {
            border: none;
            padding: 8px 15px;
            width: 200px;
            outline: none;
        }
        .search-box button {
            background: #1e3a5f;
            border: none;
            color: white;
            padding: 8px 22px;
            cursor: pointer;
        }
        .school-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin: 30px 0;
        }
        .school-card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .school-name {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0a2540;
        }
        .badge {
            background: #e9eff7;
            color: #1e3a5f;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .school-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            color: #4a6e8c;
        }
        .school-desc {
            color: #2d4a6e;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .btn-detail {
            display: inline-block;
            background: #1e3a5f;
            color: white;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 600;
        }
        .btn-detail:hover {
            background: #0f2b48;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            color: #6c86a3;
            padding-top: 20px;
            border-top: 1px solid #d0e0ff;
        }
        @media (max-width: 600px) {
            body { padding: 20px; }
            .header h1 { font-size: 2.5rem; }
            .family-tag { display: block; margin: 10px auto 0; width: fit-content; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Global繁木力</h1>
            <span class="family-tag">We are family</span>
            <div class="subtitle">让留学中国更简单 · 一站式信息平台</div>
        </div>

        <div class="filter-bar">
            <div class="filter-group" id="cityFilters"></div>
            <div class="filter-group" id="typeFilters"></div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索学校...">
                <button id="searchBtn">搜索</button>
            </div>
        </div>

        <div class="school-grid" id="schoolGrid"></div>

        <div class="footer">
            <p>© 2025 Global繁木力 · 数据持续更新中</p >
        </div>
    </div>
<script>
        (function() {
            const schools = [
                { name: '北京大学', city: '北京', type: '综合类', desc: '中国第一所国立综合性大学，人文社科与理学顶尖。', link: 'peking.html' },
                { name: '清华大学', city: '北京', type: '综合类', desc: '顶尖工科名校，经管、计算机、建筑享誉全球。', link: 'tsinghua.html' },
                { name: '复旦大学', city: '上海', type: '综合类', desc: '华东顶尖名校，新闻、经济、医学实力强劲。', link: 'fudan.html' },
                { name: '南京大学', city: '南京', type: '综合类', desc: '历史悠久，天文、地质、中文实力雄厚。', link: 'nanjing.html' },
                { name: '华中科技大学', city: '武汉', type: '理工类', desc: '机械、光电、医学、生物医学工程领先。', link: 'hust.html' },
                { name: '西安交通大学', city: '西安', type: '综合类', desc: '电气、能动、机械实力强劲，首批985/211。', link: 'xjtu.html' },
                { name: '中山大学', city: '广州', type: '综合类', desc: '三校区五校园，医学、管理、哲学突出。', link: 'sysu.html' },
                { name: '四川大学', city: '成都', type: '综合类', desc: '口腔医学享誉海内外，西部重点综合大学。', link: 'scu.html' },
                { name: '西北工业大学', city: '西安', type: '理工类', desc: '航空、航天、航海特色，“总师摇篮”。', link: 'nwpu.html' },
                { name: '山东大学', city: '济南', type: '综合类', desc: '一校三地办学，数学、中文、医学雄厚。', link: 'sdu.html' },
                { name: '华南理工大学', city: '广州', type: '理工类', desc: '四大工学院之一，工程师的摇篮。', link: 'scut.html' }
            ];

            const cities = [...new Set(schools.map(s => s.city))].sort();
            const types = [...new Set(schools.map(s => s.type))].sort();

            const cityFilters = document.getElementById('cityFilters');
            const typeFilters = document.getElementById('typeFilters');
            const schoolGrid = document.getElementById('schoolGrid');
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');

            let currentCity = 'all';
            let currentType = 'all';
            let searchKeyword = '';

            cityFilters.innerHTML = '<button class="filter-btn active" data-filter="city" data-value="all">全部城市</button>';
            cities.forEach(city => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.setAttribute('data-filter', 'city');
                btn.setAttribute('data-value', city);
                btn.textContent = city;
                cityFilters.appendChild(btn);
            });

            typeFilters.innerHTML = '<button class="filter-btn active" data-filter="type" data-value="all">全部类型</button>';
            types.forEach(type => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.setAttribute('data-filter', 'type');
                btn.setAttribute('data-value', type);
                btn.textContent = type;
                typeFilters.appendChild(btn);
            });

            function renderSchools() {
                const filtered = schools.filter(s => {
                    const cityMatch = currentCity === 'all' || s.city === currentCity;
                    const typeMatch = currentType === 'all' || s.type === currentType;
                    const searchMatch = searchKeyword === '' || s.name.includes(searchKeyword);
                    return cityMatch && typeMatch && searchMatch;
                });

                if (filtered.length === 0) {
                    schoolGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">没有找到匹配的学校</div>';
                    return;
                }

                let html = '';
                filtered.forEach(s => {
                    html += `
                        <div class="school-card">
                            <div class="card-header">
                                <span class="school-name">${s.name}</span>
                                <span class="badge">${s.type}</span>
                            </div>
                            <div class="school-meta">
                                <span>📍 ${s.city}</span>
                                <span>🏛️ ${s.type}</span>
                            </div>
                            <div class="school-desc">${s.desc}</div>
                            <a href=" " class="btn-detail">查看详情 →</a >
                        </div>
                    `;
                });
                schoolGrid.innerHTML = html;
            }

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const filter = this.dataset.filter;
                    const value = this.dataset.value;
                    const group = this.parentNode;
                    group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    if (filter === 'city') currentCity = value;
                    else if (filter === 'type') currentType = value;
                    renderSchools();
                });
            });

            searchBtn.addEventListener('click', () => {
                searchKeyword = searchInput.value.trim();
                renderSchools();
            });
            searchInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    searchKeyword = searchInput.value.trim();
                    renderSchools();
                }
            });

            renderSchools();
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>留学生来华学校信息查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: '微软雅黑', sans-serif;
            background-color: #f4f7fb;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: #1e3c72;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #4a6fa5;
            font-size: 1.2em;
        }
        .school-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .school-card {
            background: white;
            border-radius: 12px;
            padding: 25px 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid #4a90e2;
        }
        .school-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
        }
        .school-name {
            font-size: 1.5em;
            color: #1e3c72;
            margin-bottom: 10px;
        }
        .school-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #5a6b7a;
        }
        .school-type, .school-location {
            background: #e9f0f9;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .school-desc {
            color: #2c3e50;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .btn-detail {
            display: inline-block;
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-detail:hover {
            background-color: #1e3c72;
        }
        footer {
            text-align: center;
            margin-top: 50px;
            color: #7f8c8d;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 留学生来华学校信息查询</h1>
            <div class="subtitle">为留学生提供简单、清晰的中国院校信息参考</div>
        </header>

        <div class="school-grid">
            <!-- 北京大学卡片 -->
            <div class="school-card">
                <div class="school-name">北京大学</div>
                <div class="school-meta">
                    <span class="school-type">综合类</span>
                    <span class="school-location">北京</span>
                </div>
                <div class="school-desc">
                    国内顶尖综合大学，国际交流项目丰富，QS排名靠前。
                </div>
                <a href="peking.html" class="btn-detail">查看详情 →</a>
            </div>

            <!-- 清华大学卡片 -->
            <div class="school-card">
                <div class="school-name">清华大学</div>
                <div class="school-meta">
                    <span class="school-type">综合类</span>
                    <span class="school-location">北京</span>
                </div>
                <div class="school-desc">
                    理工与文科并重，国际认可度极高，拥有众多国际学生。
                </div>
                <a href="tsinghua.html" class="btn-detail">查看详情 →</a>
            </div>

            <!-- 复旦大学卡片 -->
            <div class="school-card">
                <div class="school-name">复旦大学</div>
                <div class="school-meta">
                    <span class="school-type">综合类</span>
                    <span class="school-location">上海</span>
                </div>
                <div class="school-desc">
                    华东地区顶尖名校，国际化程度高，地处上海。
                </div>
                <a href="fudan.html" class="btn-detail">查看详情 →</a>
            </div>

            <!-- 南京大学卡片 -->
            <div class="school-card">
                <div class="school-name">南京大学</div>
                <div class="school-meta">
                    <span class="school-type">综合类</span>
                    <span class="school-location">南京</span>
                </div>
                <div class="school-desc">
                    历史悠久，人文社科实力强劲，校园环境优美。
                </div>
                <a href="nanjing.html" class="btn-detail">查看详情 →</a>
            </div>

        </div>

        <footer>
            <p>© 2025 留学生来华信息查询 | 让留学中国更简单</p>
        </footer>
    </div>
</body>
</html>
